.wp-warn{background:rgba(180,64,96,.9)}

.ar-snap{display:none;position:absolute;bottom:12%;right:24px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,.85);border:3px solid #fff;cursor:pointer;z-index:25;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.3)}

.ar-flash{display:none;position:fixed;inset:0;background:#fff;z-index:100;pointer-events:none}
.ar-flash.on{display:block;animation:flash .3s ease-out forwards}
@keyframes flash{0%{opacity:.7}100%{opacity:0}}
.ar-wm{display:none;position:absolute;bottom:24px;left:24px;z-index:24;opacity:.7}
.ar-wm img{height:20px}
model-viewer[ar-status="session-started"] .ar-wm,model-viewer[ar-status="object-placed"] .ar-wm{display:block}
.v-hdr{display:none;position:fixed;top:0;left:0;right:0;height:48px;background:rgba(33,37,44,0.92);border-bottom:1px solid #0BBADC;align-items:center;padding:0 18px;z-index:40;backdrop-filter:blur(8px)}

.v-hdr-btn:hover{background:rgba(0,0,0,0.06)}

.v-toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);background:#FFFFFF;border:1px solid #0BBADC;border-radius:6px;padding:8px 16px;font-size:10px;font-weight:600;color:#364952;opacity:0;transition:opacity .3s;z-index:41;pointer-events:none}
.v-toast.show{opacity:1}
</style>

<script type="module">
const mv=document.querySelector("model-viewer");
const ld=document.getElementById("ld");
const lf=document.getElementById("lf");
const lp=document.getElementById("lp");
let modelReady=false,timerDone=false,sPct=0;
function tryHideLoader(){if(modelReady&&timerDone)ld.classList.add("done")}
function showPct(p){lf.style.width=p+"%";lp.textContent=p+" %"}
const iv=setInterval(()=>{sPct+=0.5;if(sPct>99)sPct=99;showPct(Math.round(sPct))},200);
const _isViewer=new URLSearchParams(location.search).has("viewer");
if(_isViewer){mv.removeAttribute("ar");mv.removeAttribute("ar-modes");mv.removeAttribute("ar-placement");mv.removeAttribute("ar-scale");document.title="POSPOLE 3D Vorschau";document.getElementById("v-hdr").classList.add("show")}
document.getElementById("v-share").addEventListener("click",function(){navigator.clipboard.writeText(location.href).then(function(){var t=document.getElementById("v-toast");t.classList.add("show");setTimeout(function(){t.classList.remove("show")},2000)})});
mv.addEventListener("load",()=>{clearInterval(iv);showPct(100);modelReady=true;tryHideLoader();if(_isViewer){document.getElementById("nfo").style.display="none"}else if(!mv.canActivateAR){document.getElementById("desk").style.display="flex";document.getElementById("nfo").style.display="none"}});
setTimeout(()=>{timerDone=true;tryHideLoader()},5000);
const snapBtn=document.getElementById("ar-snap");
const flashEl=document.getElementById("ar-flash");
snapBtn.addEventListener("click",async(e)=>{
  e.stopPropagation();
  try{
    const glCanvas=mv.shadowRoot.querySelector("canvas");
    if(!glCanvas){console.warn("No canvas");return}
    const w=glCanvas.width,h2=glCanvas.height;
    const cv=document.createElement("canvas");cv.width=w;cv.height=h2;
    const cx=cv.getContext("2d");cx.drawImage(glCanvas,0,0);
    const now=new Date();const ts=now.toLocaleDateString("de-DE")+", "+now.toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
    cx.font="bold "+Math.round(h2*0.02)+"px Arial";cx.fillStyle="rgba(54,73,82,.6)";
    cx.textAlign="right";cx.textBaseline="bottom";
    cx.fillText(ts,w-Math.round(h2*0.02),h2-Math.round(h2*0.02));
    flashEl.classList.add("on");setTimeout(()=>flashEl.classList.remove("on"),400);
    cv.toBlob(async(blob)=>{
      const file=new File([blob],"POSPOLE_AR.png",{type:"image/png"});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file],title:"POSPOLE AR"})}catch(e2){}
      }else{
        const a=document.createElement("a");a.href=URL.createObjectURL(blob);
        a.download="POSPOLE_AR.png";a.click();URL.revokeObjectURL(a.href);
      }
    },"image/png");
  }catch(err){console.error("Screenshot error:",err)}
});
</script>
